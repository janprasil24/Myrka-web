<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myrka | Luxusní manikúra & pedikúra Opava</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0b0b0b;color:#f5f5f5;}
h1,h2,h3{font-family:'Playfair Display',serif;}
header{text-align:center;padding:30px;background:#000;border-bottom:1px solid #c9a96e;}
.logo{height:90px;margin-bottom:10px;}
nav{display:flex;justify-content:center;gap:30px;padding:15px;background:#111;}
nav a{color:#c9a96e;text-decoration:none;}
.hero{text-align:center;padding:120px;background:radial-gradient(circle,#1a1a1a,#000);}
.btn{display:inline-block;margin-top:30px;padding:15px 30px;background:linear-gradient(45deg,#c9a96e,#f1d6a5);color:#000;border-radius:30px;text-decoration:none;}
section{padding:60px;max-width:1100px;margin:auto;}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}
.card{background:#151515;padding:25px;border-radius:12px;border:1px solid #2a2a2a;}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;background:#1a1a1a;color:white;}
button{background:#c9a96e;color:black;padding:12px;border:none;border-radius:20px;width:100%;}
iframe{width:100%;height:300px;border:none;border-radius:10px;margin-top:20px;}
footer{text-align:center;padding:30px;background:#000;border-top:1px solid #c9a96e;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<p>Luxusní manikúra & pedikúra • Opava</p>
</header>

<nav>
<a href="#home">Úvod</a>
<a href="#services">Služby</a>
<a href="#booking">Rezervace</a>
<a href="#contact">Kontakt</a>
</nav>

<section class="hero" id="home">
<h2>Dokonalost v každém detailu</h2>
<a href="tel:+420604531852" class="btn">📞 Objednat se</a>
</section>

<section id="services">
<h2>Služby</h2>
<div class="services">
<div class="card"><h3>Manikúra</h3><p>od 500 Kč</p></div>
<div class="card"><h3>Pedikúra</h3><p>od 500 Kč</p></div>
<div class="card"><h3>Design</h3><p>dle dohody</p></div>
</div>
</section>

<section id="booking">
<h2>Rezervace</h2>
<form onsubmit="sendWhatsApp(); return false;">
<input type="text" id="name" placeholder="Jméno" required>
<input type="tel" id="phone" placeholder="Telefon" required>
<input type="date" id="date" required>
<textarea id="service" placeholder="Služba"></textarea>
<button>Odeslat</button>
</form>
</section>

<section id="contact">
<h2>Kontakt</h2>
<p>Pekařská 167/14, Opava</p>
<p><a href="tel:+420604531852">604 531 852</a></p>
<iframe src="https://maps.google.com/maps?q=Pekařská%20167/14%20Opava&output=embed"></iframe>
</section>

<footer>
<p>© 2026 MYRKA</p>
</footer>

<a class="whatsapp" href="https://wa.me/420604531852">💬</a>

<script>
function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let date=document.getElementById("date").value;
let service=document.getElementById("service").value;
let message=`Dobrý den, objednávka:%0A${name}%0A${phone}%0A${date}%0A${service}`;
window.open(`https://wa.me/420604531852?text=${message}`);
}
</script>

</body>
</html>
